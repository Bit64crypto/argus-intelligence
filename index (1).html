<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Argus Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#06080F;}
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#1C2436;border-radius:2px;}
input::placeholder{color:#3A4560;}
button{outline:none;font-family:inherit;cursor:pointer;border:none;background:none;}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes ping{75%,100%{transform:scale(2.2);opacity:0;}}
@keyframes blink{0%,100%{opacity:.2;}50%{opacity:1;}}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

:root{
  --bg:#06080F;
  --s1:#090C16;
  --s2:#0C1020;
  --s3:#101628;
  --border:#171F30;
  --border2:#1F2B40;
  --text:#EAE6DC;
  --sub:#8A93A8;
  --muted:#4A5570;
  --dim:#141C2C;
  --g:#A8FF47;
  --g2:#7AC832;
  --gdim:#A8FF4718;
  --gborder:#A8FF4730;
  --gold:#C9A84C;
  --golddim:#C9A84C18;
}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;width:100vw;overflow:hidden;background:var(--bg);}
#sidebar{width:220px;flex-shrink:0;height:100vh;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;position:relative;}
#sidebar::after{content:'';position:absolute;top:0;right:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,var(--border2) 30%,var(--border2) 70%,transparent);}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#topbar{padding:0 28px;height:52px;border-bottom:1px solid var(--border);background:var(--s1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#content{flex:1;overflow:hidden;}

/* ── WORDMARK ── */
.wm{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.wm-name{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;letter-spacing:.12em;color:var(--text);display:flex;align-items:center;gap:10px;}
.wm-dot{width:6px;height:6px;border-radius:50%;background:var(--g);box-shadow:0 0 8px var(--g);flex-shrink:0;position:relative;}
.wm-dot::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:var(--g);opacity:.2;animation:ping 2.5s ease infinite;}
.wm-sub{font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.25em;margin-top:6px;text-transform:uppercase;}

/* ── NAV ── */
.nav{padding:12px 10px 0;}
.nav-section-lbl{font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.22em;padding:0 8px;margin-bottom:6px;text-transform:uppercase;}
.nb{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:5px;margin-bottom:1px;border:1px solid transparent;transition:all .15s;}
.nb:hover{background:rgba(255,255,255,.03);}
.nb.on{background:var(--gdim);border-color:var(--gborder);}
.nb-l{display:flex;align-items:center;gap:8px;}
.nb-icon{font-size:11px;color:var(--muted);width:14px;text-align:center;}
.nb.on .nb-icon{color:var(--g);}
.nb-text{font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;color:var(--sub);}
.nb.on .nb-text{color:var(--text);font-weight:600;}
.nbadge{font-size:8px;background:rgba(255,60,80,.9);color:#fff;border-radius:3px;padding:1px 5px;font-family:'JetBrains Mono',monospace;font-weight:700;min-width:16px;text-align:center;}

/* ── FEED LIST ── */
.feeds-header{display:flex;align-items:center;gap:8px;padding:14px 18px 10px;margin-top:4px;}
.feeds-line{flex:1;height:1px;background:var(--border);}
.feeds-lbl{font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.2em;white-space:nowrap;}
.jrow{display:flex;align-items:center;justify-content:space-between;padding:6px 18px;}
.jrow-l{display:flex;align-items:center;gap:8px;}
.jdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.jcode{font-size:10px;color:var(--sub);font-family:'JetBrains Mono',monospace;font-weight:500;}
.jlive{font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.12em;}

/* ── FOOTER ── */
.sf{padding:12px 18px;border-top:1px solid var(--border);margin-top:auto;}
.sf-utc{font-size:11px;color:var(--sub);font-family:'JetBrains Mono',monospace;font-weight:500;margin-bottom:3px;}
.sf-meta{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;line-height:1.7;}

/* ── TOP BAR ── */
.tb-left{display:flex;flex-direction:column;}
.tb-title{font-size:13px;font-weight:700;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-.01em;}
.tb-sub{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px;}
.tb-stats{display:flex;gap:20px;align-items:center;}
.stat{text-align:right;}
.stat-n{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;}
.stat-l{font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.12em;margin-top:1px;text-transform:uppercase;}
.stat-div{width:1px;height:28px;background:var(--border);}

/* ── PILL ── */
.pill{font-size:8px;font-weight:600;letter-spacing:.1em;padding:2px 7px;border-radius:2px;font-family:'JetBrains Mono',monospace;display:inline-block;border:1px solid;text-transform:uppercase;}

/* ── FEED PANEL ── */
.fw{display:flex;height:100%;overflow:hidden;}
.fl{width:360px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.ff{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap;background:var(--s1);}
.fbtn{padding:3px 9px;font-size:8px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .12s;letter-spacing:.1em;}
.fi-list{overflow-y:auto;flex:1;}
.fi{padding:12px 14px;border-bottom:1px solid var(--border);border-left:2px solid transparent;cursor:pointer;transition:all .12s;animation:fadeUp .25s ease both;}
.fi:hover{background:rgba(255,255,255,.02);}
.fi.on{border-left-color:var(--g);background:rgba(168,255,71,.03);}
.fi-top{display:flex;align-items:center;gap:5px;margin-bottom:7px;flex-wrap:wrap;}
.fi-title{font-size:12px;font-weight:600;color:var(--sub);font-family:'Plus Jakarta Sans',sans-serif;line-height:1.45;margin-bottom:6px;letter-spacing:-.01em;}
.fi.on .fi-title{color:var(--text);}
.fi-time{font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-left:auto;flex-shrink:0;}
.udot{width:4px;height:4px;border-radius:50%;background:var(--g);box-shadow:0 0 5px var(--g);display:inline-block;flex-shrink:0;}
.achip{font-size:8px;color:var(--gold);background:var(--golddim);border:1px solid rgba(201,168,76,.2);border-radius:2px;padding:1px 6px;font-family:'JetBrains Mono',monospace;font-weight:600;}

/* ── DETAIL ── */
.fd{flex:1;overflow-y:auto;padding:24px 28px;}
.dempty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;}
.sec-lbl{font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.2em;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:12px;text-transform:uppercase;}
.sblk{margin-bottom:20px;}
.d-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:8px;letter-spacing:-.01em;}
.d-meta{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:22px;display:flex;gap:10px;align-items:center;}
.d-meta-div{width:1px;height:10px;background:var(--border);}
.d-summary{font-size:13px;color:var(--sub);line-height:1.75;font-family:'Plus Jakarta Sans',sans-serif;}
.abox{background:var(--gdim);border:1px solid var(--gborder);border-radius:4px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;}
.abox-arrow{color:var(--g);font-size:14px;flex-shrink:0;margin-top:1px;font-family:'JetBrains Mono',monospace;}
.abox-text{font-size:13px;color:var(--text);line-height:1.7;font-family:'Plus Jakarta Sans',sans-serif;}
.dbox{display:inline-flex;align-items:center;gap:8px;background:rgba(255,60,80,.07);border:1px solid rgba(255,60,80,.18);border-radius:3px;padding:7px 13px;}
.pcard{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:12px 16px;margin-bottom:8px;transition:border-color .15s;}

/* ── DESK ── */
.dw{display:flex;flex-direction:column;height:100%;}
.ctx{padding:8px 20px;border-bottom:1px solid var(--border);background:var(--s1);display:flex;gap:16px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
.ctx-lbl{font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.2em;}
.ctx-tag{font-size:8px;font-family:'JetBrains Mono',monospace;font-weight:600;letter-spacing:.1em;}
.msgs{flex:1;overflow-y:auto;padding:20px 24px;}
.mw{display:flex;flex-direction:column;margin-bottom:18px;animation:fadeUp .2s ease;}
.mw.user{align-items:flex-end;}
.mw.assistant{align-items:flex-start;}
.mfrom{font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.16em;margin-bottom:4px;text-transform:uppercase;}
.mbub{max-width:76%;padding:12px 16px;font-size:13px;line-height:1.7;font-family:'Plus Jakarta Sans',sans-serif;white-space:pre-wrap;}
.mbub.user{background:var(--gdim);border:1px solid var(--gborder);border-radius:10px 10px 2px 10px;color:var(--g);}
.mbub.assistant{background:var(--s2);border:1px solid var(--border);border-radius:2px 10px 10px 10px;color:var(--sub);}
.tbub{background:var(--s2);border:1px solid var(--border);border-radius:2px 10px 10px 10px;padding:12px 18px;display:flex;gap:4px;align-items:center;}
.tdot{width:4px;height:4px;border-radius:50%;background:var(--g);display:block;}
.suggs{padding:0 24px 12px;}
.sg-lbl{font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.2em;margin-bottom:7px;text-transform:uppercase;}
.sg-btn{font-size:11.5px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;color:var(--sub);background:var(--s2);border:1px solid var(--border);border-radius:4px;padding:7px 12px;transition:all .12s;text-align:left;margin:2px 3px 2px 0;display:inline-block;}
.sg-btn:hover{border-color:var(--g);color:var(--g);}
.ir{padding:12px 24px 20px;border-top:1px solid var(--border);display:flex;gap:8px;}
.ci{flex:1;background:var(--s2);border:1px solid var(--border2);border-radius:6px;padding:10px 14px;color:var(--text);font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:border-color .15s;}
.ci:focus{border-color:var(--g);}
.sb{padding:10px 20px;border-radius:6px;font-weight:700;font-size:13px;font-family:'JetBrains Mono',monospace;transition:all .15s;flex-shrink:0;}
.sb.on{background:var(--g);color:#06080F;box-shadow:0 0 20px rgba(168,255,71,.2);}
.sb.off{background:var(--dim);color:var(--muted);cursor:not-allowed;}

/* ── RISK ── */
.rw{padding:20px 24px;overflow-y:auto;height:100%;}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.rcard{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:18px;transition:all .2s;position:relative;overflow:hidden;animation:fadeUp .3s ease both;}
.rcard:hover{transform:translateY(-2px);}
.rcard-glow{position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;opacity:.04;pointer-events:none;}
.rleg{margin-top:14px;background:var(--s2);border:1px solid var(--border);border-radius:5px;padding:12px 18px;display:flex;gap:22px;align-items:center;flex-wrap:wrap;}

/* ── RING ── */
.ring-wrap{position:relative;flex-shrink:0;}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="wm">
      <div class="wm-name">
        <span class="wm-dot"></span>
        ARGUS
      </div>
      <div class="wm-sub">Intelligence Platform</div>
    </div>
    <div class="nav">
      <div class="nav-section-lbl" style="margin-bottom:8px">Monitor</div>
      <button class="nb on" data-view="feed" onclick="sv('feed')">
        <div class="nb-l"><span class="nb-icon">◈</span><span class="nb-text">Intelligence Feed</span></div>
        <span class="nbadge" id="badge-feed"></span>
      </button>
      <button class="nb" data-view="desk" onclick="sv('desk')">
        <div class="nb-l"><span class="nb-icon">⊡</span><span class="nb-text">Analyst Desk</span></div>
      </button>
      <button class="nb" data-view="risk" onclick="sv('risk')">
        <div class="nb-l"><span class="nb-icon">◎</span><span class="nb-text">Counterparty Risk</span></div>
        <span class="nbadge" id="badge-risk"></span>
      </button>
    </div>
    <div>
      <div class="feeds-header"><div class="feeds-line"></div><span class="feeds-lbl">Active Feeds</span><div class="feeds-line"></div></div>
      <div id="jrows"></div>
    </div>
    <div class="sf">
      <div class="sf-utc" id="utc">00:00:00 UTC</div>
      <div class="sf-meta">5 jurisdictions · 6 protocols<br/><span style="color:var(--g2)">Pipeline active</span></div>
    </div>
  </aside>

  <div id="main">
    <div id="topbar">
      <div class="tb-left">
        <div class="tb-title" id="tb-title">Intelligence Feed</div>
        <div class="tb-sub" id="tb-sub">Real-time regulatory monitoring · 5 jurisdictions</div>
      </div>
      <div class="tb-stats" id="tb-stats"></div>
    </div>
    <div id="content">
      <div id="view-feed" style="height:100%"></div>
      <div id="view-desk" style="height:100%;display:none"></div>
      <div id="view-risk" style="height:100%;display:none"></div>
    </div>
  </div>
</div>

<script>
const ANTHROPIC_API_KEY = "YOUR_API_KEY_HERE";

const J=[{code:"US",color:"#4A9EFF"},{code:"EU",color:"#A8FF47"},{code:"SG",color:"#47FFD4"},{code:"UK",color:"#FFB847"},{code:"UAE",color:"#FF7847"}];
const RC={LOW:"#47FFB8",MEDIUM:"#FFB847",HIGH:"#FF4D6A"};
const PROTOCOLS=[
  {name:"Aave",    type:"DeFi Lending",   risk:"LOW",   score:82,delta:"+2",exp:["EU","UK"]},
  {name:"Uniswap", type:"DEX Protocol",   risk:"LOW",   score:79,delta:"-1",exp:["US","EU"]},
  {name:"Lido",    type:"Liquid Staking", risk:"MEDIUM",score:61,delta:"-4",exp:["EU","UK"]},
  {name:"MakerDAO",type:"CDP Stablecoin", risk:"MEDIUM",score:58,delta:"-6",exp:["EU"]},
  {name:"dYdX",    type:"Perps DEX",      risk:"MEDIUM",score:55,delta:"-3",exp:["US"]},
  {name:"Tornado", type:"Privacy Mixer",  risk:"HIGH",  score:12,delta:"0", exp:["US","EU","UK","SG","UAE"]}
];
const FALLBACK=[
  {id:1,j:"EU",urgency:"HIGH",time:"Mar 10 2026",unread:true,tag:"STABLECOINS",title:"MiCA Art. 45 — €200M/day Stablecoin Cap Binding from Q3 2026",summary:"ESMA published binding technical standards under MiCA Article 45 setting a €200M/day retail transaction cap on all e-money tokens. Non-compliance triggers automatic suspension. Directly applicable — no national transposition required.",affects:["MakerDAO","Lido"],action:"Review stablecoin issuance volumes immediately. Legal counsel engagement required before May 1. MakerDAO DAI and Lido stETH both within scope.",deadline:"May 1, 2026",source:"ESMA Official Journal · Reg (EU) 2023/1114 Art. 45"},
  {id:2,j:"US",urgency:"HIGH",time:"Mar 10 2026",unread:true,tag:"MARKET STRUCTURE",title:"CLARITY Act Senate Markup Stalled — ABA Rejects White House Compromise",summary:"The American Bankers Association formally rejected the White House-brokered CLARITY Act compromise on March 5, 2026. SEC/CFTC jurisdictional split over digital assets remains legally unresolved, creating acute uncertainty for custody architecture decisions.",affects:["Uniswap","dYdX"],action:"Freeze custody structure commitments. Do not adopt SEC-only or CFTC-only compliance posture until jurisdiction is resolved. Monitor OCC charter route — April 1 rule effective date.",deadline:"Late March 2026",source:"Senate Banking Committee · Baker McKenzie"},
  {id:3,j:"US",urgency:"MEDIUM",time:"Mar 10 2026",unread:false,tag:"ENFORCEMENT",title:"SEC Staff Bulletin 2026-04 — AMMs at Risk of Broker-Dealer Classification",summary:"SEC guidance clarifies that AMMs with governance tokens enabling fee extraction may qualify as broker-dealers under the Exchange Act. 60-day comment period open. No immediate enforcement action signaled.",affects:["Uniswap","dYdX"],action:"Prepare legal analysis of governance token exposure. Low immediate risk — monitor for enforcement signals during comment period.",deadline:"60-day comment period",source:"SEC.gov Staff Bulletin 2026-04"},
  {id:4,j:"UK",urgency:"MEDIUM",time:"Mar 9 2026",unread:false,tag:"AML/CFT",title:"FCA PS26/1 — Travel Rule Threshold Lowered to £0 from June 2026",summary:"FCA lowered the travel rule threshold to £0, requiring UK-regulated firms to collect full originator and beneficiary data on every crypto transfer. Exceeds FATF guidance.",affects:[],action:"Update transaction monitoring infrastructure before June 1, 2026. Engage operations and compliance teams immediately.",deadline:"June 1, 2026",source:"FCA PS26/1 · MLR 2017"},
  {id:5,j:"SG",urgency:"LOW",time:"Mar 8 2026",unread:false,tag:"LICENSING",title:"MAS PSN02 — On-Chain Analytics Mandatory for DPT Licensees Q4 2026",summary:"MAS revised DPT licensing criteria to mandate approved on-chain analytics tools for AML compliance. Three vendors approved. Existing licensees have until Q4 2026.",affects:[],action:"Verify analytics tooling against MAS approved vendor list.",deadline:"Q4 2026",source:"MAS Notice PSN02"},
  {id:6,j:"UAE",urgency:"LOW",time:"Mar 7 2026",unread:false,tag:"CUSTODY",title:"VARA Rulebook V2 — Real-Time Proof-of-Reserves Required Jan 2027",summary:"VARA updated custody rulebook requires full asset segregation and real-time proof-of-reserves for all licensed custodians. Effective January 2027 with 6-month grace period.",affects:["Aave"],action:"No immediate action. Add to 2027 compliance roadmap.",deadline:"January 2027",source:"VARA Rulebook V2.0"}
];
const SYS=`You are the Argus Intelligence analyst desk — senior crypto regulatory intelligence analyst serving institutional clients.
ACTIVE ALERTS: MiCA Art.45 €200M/day cap Q3 2026 (MakerDAO/Lido). CLARITY Act STALLED Mar 5 2026. SEC Bulletin 2026-04 AMM broker-dealer risk. MAS PSN02 analytics Q4 2026. VARA V2 Jan 2027. FCA PS26/1 £0 travel rule Jun 2026.
SCORES: Aave 82 LOW · Uniswap 79 LOW · Lido 61 MEDIUM · MakerDAO 58 MEDIUM · dYdX 55 MEDIUM · Tornado 12 HIGH.
STYLE: Direct, institutional, senior analyst voice. No disclaimers. Structure: situation → timeline → implication → action.`;
const SUGGS=["Should we custody assets with Lido given EU exposure?","What does the CLARITY Act stall mean for our trading desk?","Compare Aave vs MakerDAO for institutional custody risk","What are our key compliance deadlines this quarter?"];
const HDR={feed:{t:"Intelligence Feed",s:"Real-time regulatory monitoring · 5 jurisdictions"},desk:{t:"Analyst Desk",s:"Live Claude intelligence · Full regulatory context loaded"},risk:{t:"Counterparty Risk",s:"Protocol safety scores · Updated on regulatory event"}};

let FEED=[...FALLBACK],selId=FEED[0].id,filt="ALL",view="feed",msgs=[],loading=false;

function ha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function jc(c){return(J.find(x=>x.code===c)||{color:"#888"}).color;}
function pill(l,c,dim){return `<span class="pill" style="color:${c};background:${dim?ha(c,.07):'transparent'};border-color:${ha(c,dim?.18:.28)}">${l}</span>`;}
function up(lv){const labels={HIGH:"HIGH",MEDIUM:"MED",LOW:"LOW"};return pill(labels[lv],RC[lv],true);}
function jp(c){return pill(c,jc(c),true);}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function ring(score,risk,sz){
  sz=sz||68;const r=(sz-10)/2,ci=2*Math.PI*r,f=(score/100)*ci,cx=sz/2,col=RC[risk];
  return `<div class="ring-wrap" style="width:${sz}px;height:${sz}px"><svg width="${sz}" height="${sz}" style="transform:rotate(-90deg);display:block"><circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="#141C2C" stroke-width="4"/><circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${col}" stroke-width="4" stroke-dasharray="${f} ${ci-f}" stroke-linecap="round" style="filter:drop-shadow(0 0 4px ${col}70)"/></svg><div class="ring-label"><span style="font-size:15px;font-weight:700;color:${col};font-family:'JetBrains Mono',monospace;line-height:1">${score}</span><span style="font-size:7px;color:var(--muted);font-family:'JetBrains Mono',monospace">/100</span></div></div>`;}

function updateBadges(){
  const u=FEED.filter(f=>f.unread).length,h=PROTOCOLS.filter(p=>p.risk==='HIGH').length;
  const bf=document.getElementById('badge-feed'),br=document.getElementById('badge-risk');
  if(bf){bf.textContent=u;bf.style.display=u>0?'':'none';}
  if(br){br.textContent=h;br.style.display=h>0?'':'none';}
}
function buildStats(){
  const items=[[FEED.filter(f=>f.urgency==='HIGH').length,'High Alerts','#FF4D6A'],[FEED.filter(f=>f.unread).length,'Unread','#FFB847'],[PROTOCOLS.length,'Protocols','#47FFD4'],[J.length,'Feeds','#4A9EFF']];
  document.getElementById('tb-stats').innerHTML=items.map(([n,l,c],i)=>`${i>0?'<div class="stat-div"></div>':''}<div class="stat"><div class="stat-n" style="color:${c}">${n}</div><div class="stat-l">${l}</div></div>`).join('');
}
function buildJrows(){
  document.getElementById('jrows').innerHTML=J.map(j=>`<div class="jrow"><div class="jrow-l"><span class="jdot" style="background:${j.color};box-shadow:0 0 5px ${j.color}"></span><span class="jcode">${j.code}</span></div><span class="jlive">LIVE</span></div>`).join('');
}
function sv(v){
  view=v;
  ['feed','desk','risk'].forEach(id=>{document.getElementById('view-'+id).style.display=id===v?'':'none';document.querySelector(`.nb[data-view="${id}"]`).classList.toggle('on',id===v);});
  document.getElementById('tb-title').textContent=HDR[v].t;
  document.getElementById('tb-sub').textContent=HDR[v].s;
}
function startClock(){
  const t=()=>{const d=new Date(),e=document.getElementById('utc');if(e)e.textContent=[d.getUTCHours(),d.getUTCMinutes(),d.getUTCSeconds()].map(n=>String(n).padStart(2,'0')).join(':')+' UTC';};
  t();setInterval(t,1000);
}

// FEED
function renderFeed(){
  document.getElementById('view-feed').innerHTML=`<div class="fw"><div class="fl"><div class="ff" id="ff"></div><div class="fi-list" id="fil"></div></div><div class="fd" id="fd"></div></div>`;
  buildFilters();buildItems();buildDetail();
}
function buildFilters(){
  const el=document.getElementById('ff');if(!el)return;
  el.innerHTML=['ALL',...J.map(j=>j.code)].map(f=>{const c=f==='ALL'?'var(--g)':jc(f),on=filt===f;return `<button class="fbtn" onclick="setF('${f}')" style="${on?`border-color:${c};background:${ha(c==='var(--g)'?'#A8FF47':c,.08)};color:${c}`:''}">${f}</button>`;}).join('');
}
function setF(f){filt=f;buildFilters();buildItems();}
function buildItems(){
  const el=document.getElementById('fil');if(!el)return;
  const list=filt==='ALL'?FEED:FEED.filter(i=>i.j===filt);
  el.innerHTML=list.map((item,idx)=>{const rc=RC[item.urgency],on=item.id===selId;
    return `<div class="fi${on?' on':''}" style="animation-delay:${idx*.04}s;${on?`border-left-color:var(--g);background:rgba(168,255,71,.03)`:''}" onclick="sel(${item.id})">
      <div class="fi-top">${jp(item.j)}${up(item.urgency)}${pill(item.tag,'var(--muted)',false)}${item.unread?'<span class="udot"></span>':''}<span class="fi-time">${item.time}</span></div>
      <div class="fi-title">${item.title}</div>
      ${item.affects&&item.affects.length?`<div style="display:flex;gap:3px;flex-wrap:wrap">${item.affects.map(p=>`<span class="achip">⚡ ${p}</span>`).join('')}</div>`:''}
    </div>`;}).join('');
}
function sel(id){selId=id;buildItems();buildDetail();}
function buildDetail(){
  const el=document.getElementById('fd');if(!el)return;
  const item=FEED.find(f=>f.id===selId);
  if(!item){el.innerHTML=`<div class="dempty"><span style="font-size:40px;opacity:.04;color:var(--text);font-family:'Cormorant Garamond',serif">ARGUS</span><span style="font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.1em">SELECT AN ALERT</span></div>`;return;}
  const r2=10,ci2=2*Math.PI*r2;
  el.innerHTML=`<div style="animation:fadeUp .2s ease">
    <div style="display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap">${jp(item.j)}${up(item.urgency)}${pill(item.tag,'var(--muted)',false)}</div>
    <div class="d-title">${item.title}</div>
    <div class="d-meta"><span>${item.time}</span><div class="d-meta-div"></div><span style="color:var(--muted)">SOURCE: ${item.source}</span></div>
    <div class="sblk"><div class="sec-lbl">Intelligence Summary</div><p class="d-summary">${item.summary}</p></div>
    <div class="sblk"><div class="sec-lbl">Recommended Action</div><div class="abox"><span class="abox-arrow">→</span><p class="abox-text">${item.action}</p></div></div>
    ${item.deadline?`<div class="sblk"><div class="sec-lbl">Key Deadline</div><div class="dbox"><span style="color:#FF4D6A;font-size:11px">⏱</span><span style="font-size:11px;color:#FF4D6A;font-family:'JetBrains Mono',monospace;font-weight:600">${item.deadline}</span></div></div>`:''}
    ${item.affects&&item.affects.length?`<div class="sblk"><div class="sec-lbl">Protocol Exposure</div>${item.affects.map(name=>{const p=PROTOCOLS.find(x=>x.name===name);if(!p)return '';const col=RC[p.risk],f2=(p.score/100)*ci2;return `<div class="pcard" onmouseenter="this.style.borderColor='${ha(col,.25)}'" onmouseleave="this.style.borderColor='var(--border)'"><div><div style="font-size:13px;font-weight:700;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;margin-bottom:2px">${p.name}</div><div style="font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace">${p.type}</div></div><div style="display:flex;align-items:center;gap:12px"><div style="text-align:right"><div style="font-size:9px;color:${col};font-family:'JetBrains Mono',monospace;font-weight:600;margin-bottom:2px">${p.risk} RISK</div><div style="font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace">Score ${p.score}/100</div></div><div style="position:relative;width:28px;height:28px"><svg width="28" height="28" style="transform:rotate(-90deg);display:block"><circle cx="14" cy="14" r="${r2}" fill="none" stroke="#141C2C" stroke-width="3.5"/><circle cx="14" cy="14" r="${r2}" fill="none" stroke="${col}" stroke-width="3.5" stroke-dasharray="${f2} ${ci2-f2}" stroke-linecap="round"/></svg></div></div></div>`;}).join('')}</div>`:''}
  </div>`;
}

// DESK
function renderDesk(){
  msgs=[{role:'assistant',content:'Argus Intelligence Desk — online.\n\nContext loaded: 6 active regulatory alerts · 6 protocol risk profiles · 5 jurisdiction feeds.\n\nWhat do you need?'}];
  document.getElementById('view-desk').innerHTML=`<div class="dw">
    <div class="ctx"><span class="ctx-lbl">CONTEXT LOADED:</span>${[['6 ALERTS','#FF4D6A'],['6 PROTOCOLS','#FFB847'],['5 FEEDS','#47FFD4'],['CLARITY ACT','#A8FF47'],['MiCA Q3 2026','#4A9EFF']].map(([v,c])=>`<span class="ctx-tag" style="color:${c}">● ${v}</span>`).join('')}</div>
    <div class="msgs" id="msgs"></div>
    <div class="suggs" id="suggs"><div class="sg-lbl" style="margin-bottom:8px">Suggested queries</div><div>${SUGGS.map(s=>`<button class="sg-btn" onclick="fq(this)">${s}</button>`).join('')}</div></div>
    <div class="ir"><input class="ci" id="ci" placeholder="Ask about any regulation, protocol, or jurisdiction…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"/><button class="sb off" id="sb" onclick="send()">→</button></div>
  </div>`;
  renderMsgs();
  document.getElementById('ci').addEventListener('input',e=>{const b=document.getElementById('sb');if(b)b.className='sb '+(e.target.value.trim()?'on':'off');});
}
function fq(btn){const i=document.getElementById('ci');if(i){i.value=btn.textContent;i.dispatchEvent(new Event('input'));i.focus();}}
function renderMsgs(){
  const el=document.getElementById('msgs');if(!el)return;
  el.innerHTML=msgs.map(m=>`<div class="mw ${m.role}"><div class="mfrom">${m.role==='user'?'You':'◈ Argus Intelligence'}</div><div class="mbub ${m.role}">${esc(m.content)}</div></div>`).join('');
  if(loading)el.innerHTML+=`<div class="mw assistant"><div class="mfrom">◈ Argus Intelligence</div><div class="tbub">${[0,1,2].map(i=>`<span class="tdot" style="animation:blink 1.2s ease ${i*.22}s infinite"></span>`).join('')}</div></div>`;
  el.scrollTop=el.scrollHeight;
  const s=document.getElementById('suggs');if(s)s.style.display=msgs.some(m=>m.role==='user')?'none':'';
}
async function send(){
  const inp=document.getElementById('ci');if(!inp||!inp.value.trim()||loading)return;
  const txt=inp.value.trim();inp.value='';
  document.getElementById('sb').className='sb off';
  msgs.push({role:'user',content:txt});loading=true;renderMsgs();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-allow-browser':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,messages:msgs.map(m=>({role:m.role,content:m.content}))})});
    const data=await res.json();
    msgs.push({role:'assistant',content:data.content?.[0]?.text||'No response.'});
  }catch(e){msgs.push({role:'assistant',content:'Connection error — check your API key and retry.'});}
  loading=false;renderMsgs();
}

// RISK
function renderRisk(){
  document.getElementById('view-risk').innerHTML=`<div class="rw">
    <div style="margin-bottom:16px"><div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--text);margin-bottom:3px">Counterparty Risk Monitor</div><div style="font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace">Scores reflect current regulatory exposure · Higher = safer for institutional custody</div></div>
    <div class="rgrid">${PROTOCOLS.map((p,i)=>{const col=RC[p.risk],d=parseFloat(p.delta);return `<div class="rcard" style="animation-delay:${i*.06}s" onmouseenter="this.style.borderColor='${ha(col,.28)}';this.style.boxShadow='0 8px 32px ${ha(col,.07)}'" onmouseleave="this.style.borderColor='var(--border)';this.style.boxShadow='none'">
      <div class="rcard-glow" style="background:${col}"></div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px"><div><div style="font-size:15px;font-weight:700;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;margin-bottom:2px">${p.name}</div><div style="font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace">${p.type}</div></div>${up(p.risk)}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">${ring(p.score,p.risk,68)}<div style="text-align:right"><div style="font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${d>=0?'#47FFB8':'#FF4D6A'};margin-bottom:2px">${d>=0?'▲':'▼'} ${Math.abs(d)}</div><div style="font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.1em">WK DELTA</div></div></div>
      <div><div style="font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.14em;margin-bottom:6px;text-transform:uppercase">Exposure</div><div style="display:flex;gap:3px;flex-wrap:wrap">${p.exp.map(c=>jp(c)).join('')}</div></div>
    </div>`;}).join('')}</div>
    <div class="rleg"><span style="font-size:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase">Score Legend:</span>${[['75–100','#47FFB8','Institutional custody safe'],['50–74','#FFB847','Monitor — legal review advised'],['0–49','#FF4D6A','Avoid for institutional use']].map(([r,c,d])=>`<div style="display:flex;align-items:center;gap:7px"><span style="width:6px;height:6px;border-radius:50%;background:${c};display:block;box-shadow:0 0 5px ${c}"></span><span style="font-size:9px;color:${c};font-family:'JetBrains Mono',monospace;font-weight:600">${r}</span><span style="font-size:9px;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif">${d}</span></div>`).join('')}</div>
  </div>`;
}

document.addEventListener('DOMContentLoaded',()=>{
  buildJrows();buildStats();renderFeed();renderDesk();renderRisk();startClock();updateBadges();
  fetch('feed.json?t='+Date.now()).then(r=>r.json()).then(d=>{
    if(Array.isArray(d)&&d.length>0){FEED=d;selId=FEED[0].id;renderFeed();buildStats();updateBadges();
      document.getElementById('tb-sub').textContent='Real-time monitoring · Updated '+new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
  }).catch(()=>{});
});
</script>
</body>
</html>
