<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Argus Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#05070F;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#17202F;border-radius:2px;}
input::placeholder{color:#3E4D6A;}button{outline:none;font-family:inherit;cursor:pointer;}
@keyframes ping{75%,100%{transform:scale(2.4);opacity:0;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes blink{0%,100%{opacity:.15;transform:scale(.8);}50%{opacity:1;transform:scale(1);}}
:root{
  --bg:#05070F;--surface:#090C17;--card:#0E1220;--border:#17202F;--borderHi:#232F48;
  --text:#E2E8F8;--sub:#7A8AAE;--muted:#3E4D6A;--dim:#1A2438;
  --accent:#B8FF00;--accentBg:#B8FF0010;--accentLo:#506900;
  --red:#FF3355;--redBg:#FF335514;--amber:#FFAA00;--amberBg:#FFAA0014;
  --teal:#00DEB0;--blue:#3DA5FF;--orange:#FF7040;
}
#app{display:flex;height:100vh;width:100vw;overflow:hidden;background:var(--bg);background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:26px 26px;}
#sidebar{width:228px;flex-shrink:0;height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#headerbar{padding:14px 28px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#content{flex:1;overflow:hidden;}
.wordmark{padding:22px 20px 18px;border-bottom:1px solid var(--border);}
.wname{font-size:23px;font-weight:900;letter-spacing:-0.05em;font-family:'Unbounded',sans-serif;background:linear-gradient(120deg,#B8FF00,#70CC00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:inline-block;}
.wsub{font-size:8px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.22em;margin-top:5px;}
.nav-section{padding:14px 12px 0;}
.nav-lbl{font-size:8px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.2em;padding:0 8px;margin-bottom:8px;}
.nbtn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:7px;margin-bottom:2px;border:1px solid transparent;background:transparent;transition:all .15s;}
.nbtn:hover{background:#ffffff05;}
.nbtn.active{border-color:rgba(184,255,0,.21);background:var(--accentBg);}
.nicon{font-size:13px;color:var(--muted);line-height:1;}
.nbtn.active .nicon{color:var(--accent);}
.ntext{font-size:11.5px;font-family:'Manrope',sans-serif;font-weight:500;color:var(--sub);}
.nbtn.active .ntext{font-weight:700;color:var(--text);}
.nbadge{font-size:9px;background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-family:'IBM Plex Mono',monospace;font-weight:700;box-shadow:0 0 8px rgba(255,51,85,.38);}
.feeds-sec{padding:6px 20px 0;}
.fdiv{display:flex;align-items:center;gap:10px;margin:18px 0 12px;}
.fdiv-line{flex:1;height:1px;background:var(--border);}
.fdiv-lbl{font-size:8px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.18em;flex-shrink:0;}
.frow{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);}
.frow-l{display:flex;align-items:center;gap:9px;}
.fcode{font-size:11px;color:var(--sub);font-family:'IBM Plex Mono',monospace;font-weight:500;}
.flive{font-size:8px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;}
.sfooter{padding:14px 20px;border-top:1px solid var(--border);margin-top:auto;}
.sftext{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--muted);line-height:2;}
.dot-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;width:10px;height:10px;flex-shrink:0;}
.dot-ping{position:absolute;inset:0;border-radius:50%;opacity:.2;animation:ping 2s cubic-bezier(0,0,.2,1) infinite;}
.dot-core{width:6px;height:6px;border-radius:50%;display:block;}
.hdr-title{font-size:15px;font-weight:800;color:var(--text);font-family:'Manrope',sans-serif;margin-bottom:3px;}
.hdr-sub{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
.hdr-stats{display:flex;gap:24px;}
.stat-n{font-size:21px;font-weight:800;font-family:'IBM Plex Mono',monospace;line-height:1;text-align:center;}
.stat-l{font-size:8px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.14em;margin-top:2px;text-align:center;}
.pill{font-size:9px;font-weight:700;letter-spacing:.12em;border:1px solid;padding:2px 8px;border-radius:3px;font-family:'IBM Plex Mono',monospace;flex-shrink:0;display:inline-block;}
.feed-wrap{display:flex;height:100%;overflow:hidden;}
.feed-list{width:388px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.feed-filters{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:5px;flex-wrap:wrap;}
.fbtn{padding:3px 10px;font-size:9px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-weight:700;letter-spacing:.1em;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;}
.feed-items{overflow-y:auto;flex:1;}
.fitem{padding:14px 16px;border-bottom:1px solid var(--border);border-left:3px solid transparent;background:transparent;cursor:pointer;transition:all .15s;animation:fadeIn .3s ease both;}
.fitem:hover{background:#ffffff04;}
.fibadges{display:flex;align-items:center;gap:5px;margin-bottom:8px;flex-wrap:wrap;}
.fititle{font-size:12.5px;font-weight:700;color:var(--sub);font-family:'Manrope',sans-serif;line-height:1.4;margin-bottom:7px;}
.fitem.active .fititle{color:var(--text);}
.fitime{font-size:9px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-left:auto;}
.udot{width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);display:inline-block;margin-left:2px;flex-shrink:0;}
.achip{font-size:9px;color:var(--amber);background:var(--amberBg);border:1px solid rgba(255,170,0,.16);border-radius:3px;padding:1px 7px;font-family:'IBM Plex Mono',monospace;}
.feed-detail{flex:1;overflow-y:auto;padding:32px 36px;}
.dempty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;}
.slbl{font-size:9px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.18em;padding-bottom:9px;border-bottom:1px solid var(--border);margin-bottom:13px;}
.sblock{margin-bottom:24px;}
.stext{font-size:13.5px;color:var(--sub);line-height:1.8;font-family:'Manrope',sans-serif;}
.abox{background:var(--accentBg);border:1px solid rgba(184,255,0,.13);border-radius:9px;padding:16px 18px;display:flex;gap:13px;align-items:flex-start;}
.dbox{display:inline-flex;align-items:center;gap:10px;background:var(--redBg);border:1px solid rgba(255,51,85,.16);border-radius:6px;padding:9px 16px;}
.pcard{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:10px;transition:border-color .15s;}
.desk-wrap{display:flex;flex-direction:column;height:100%;}
.ctx-strip{padding:9px 24px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;gap:18px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
.msgs{flex:1;overflow-y:auto;padding:28px 32px;}
.msg-w{display:flex;flex-direction:column;margin-bottom:22px;animation:fadeIn .2s ease;}
.msg-w.user{align-items:flex-end;}
.msg-w.assistant{align-items:flex-start;}
.mfrom{font-size:8px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.16em;margin-bottom:5px;}
.mbub{max-width:78%;padding:14px 18px;font-size:13.5px;line-height:1.78;font-family:'Manrope',sans-serif;white-space:pre-wrap;}
.mbub.user{background:var(--accentBg);border:1px solid rgba(184,255,0,.16);border-radius:12px 12px 3px 12px;color:var(--accent);}
.mbub.assistant{background:var(--card);border:1px solid var(--border);border-radius:3px 12px 12px 12px;color:var(--sub);}
.typing-bub{background:var(--card);border:1px solid var(--border);border-radius:3px 12px 12px 12px;padding:14px 20px;display:flex;gap:5px;align-items:center;}
.tdot{width:5px;height:5px;border-radius:50%;background:var(--accent);display:block;}
.suggs{padding:0 32px 14px;}
.sugg-btn{font-size:11.5px;font-family:'Manrope',sans-serif;font-weight:500;color:var(--sub);background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 13px;transition:all .15s;text-align:left;margin:3px;}
.sugg-btn:hover{border-color:var(--accent);color:var(--accent);}
.inp-row{padding:14px 32px 28px;border-top:1px solid var(--border);display:flex;gap:8px;}
.cinput{flex:1;background:var(--card);border:1px solid var(--borderHi);border-radius:9px;padding:12px 16px;color:var(--text);font-size:13.5px;font-family:'Manrope',sans-serif;outline:none;transition:border-color .15s;}
.cinput:focus{border-color:var(--accent);}
.sbtn{padding:12px 22px;border-radius:9px;border:none;font-weight:800;font-size:15px;font-family:'IBM Plex Mono',monospace;transition:all .15s;flex-shrink:0;}
.sbtn.on{background:var(--accent);color:#05070F;box-shadow:0 0 24px rgba(184,255,0,.25);}
.sbtn.off{background:var(--dim);color:var(--muted);cursor:not-allowed;}
.risk-wrap{padding:28px 32px;overflow-y:auto;height:100%;}
.risk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.rcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;transition:all .2s;position:relative;overflow:hidden;animation:fadeIn .35s ease both;}
.rcard:hover{transform:translateY(-3px);}
.rleg{margin-top:22px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 22px;display:flex;gap:28px;align-items:center;flex-wrap:wrap;}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="wordmark">
      <div style="display:flex;align-items:center;gap:9px">
        <span class="wname">ARGUS</span>
        <span class="dot-wrap"><span class="dot-ping" style="background:#B8FF00"></span><span class="dot-core" style="background:#B8FF00;box-shadow:0 0 7px #B8FF00"></span></span>
      </div>
      <div class="wsub">INTELLIGENCE PLATFORM</div>
    </div>
    <div class="nav-section">
      <div class="nav-lbl">MONITOR</div>
      <button class="nbtn active" data-view="feed" onclick="switchView('feed')">
        <div style="display:flex;align-items:center;gap:9px"><span class="nicon">◈</span><span class="ntext">Intelligence Feed</span></div>
        <span class="nbadge" id="badge-feed"></span>
      </button>
      <button class="nbtn" data-view="desk" onclick="switchView('desk')">
        <div style="display:flex;align-items:center;gap:9px"><span class="nicon">⊡</span><span class="ntext">Analyst Desk</span></div>
      </button>
      <button class="nbtn" data-view="risk" onclick="switchView('risk')">
        <div style="display:flex;align-items:center;gap:9px"><span class="nicon">◎</span><span class="ntext">Counterparty Risk</span></div>
        <span class="nbadge" id="badge-risk"></span>
      </button>
    </div>
    <div class="feeds-sec">
      <div class="fdiv"><div class="fdiv-line"></div><span class="fdiv-lbl">ACTIVE FEEDS</span><div class="fdiv-line"></div></div>
      <div id="feed-rows"></div>
    </div>
    <div class="sfooter">
      <div class="sftext">
        <div><span style="color:var(--sub);font-weight:700" id="utc">00:00:00</span> <span>UTC</span></div>
        <div>13,000+ startups tracked</div>
        <div style="color:var(--accentLo)">5 jurisdictions · 6 protocols</div>
      </div>
    </div>
  </aside>
  <div id="main">
    <div id="headerbar">
      <div><div class="hdr-title" id="hdr-title">Intelligence Feed</div><div class="hdr-sub" id="hdr-sub">Real-time monitoring · 5 jurisdictions</div></div>
      <div class="hdr-stats" id="hdr-stats"></div>
    </div>
    <div id="content">
      <div id="view-feed" style="height:100%"></div>
      <div id="view-desk" style="height:100%;display:none"></div>
      <div id="view-risk" style="height:100%;display:none"></div>
    </div>
  </div>
</div>
<script>
const ANTHROPIC_API_KEY = "YOUR_API_KEY_HERE";

const J = [
  {code:"US",color:"#3DA5FF"},{code:"EU",color:"#B8FF00"},
  {code:"SG",color:"#00DEB0"},{code:"UK",color:"#FFAA00"},{code:"UAE",color:"#FF7040"}
];
const RC = {LOW:"#00DEB0",MEDIUM:"#FFAA00",HIGH:"#FF3355"};
const PROTOCOLS = [
  {name:"Aave",    type:"DeFi Lending",   risk:"LOW",   score:82,delta:"+2",exp:["EU","UK"]},
  {name:"Uniswap", type:"DEX Protocol",   risk:"LOW",   score:79,delta:"-1",exp:["US","EU"]},
  {name:"Lido",    type:"Liquid Staking", risk:"MEDIUM",score:61,delta:"-4",exp:["EU","UK"]},
  {name:"MakerDAO",type:"CDP Stablecoin", risk:"MEDIUM",score:58,delta:"-6",exp:["EU"]},
  {name:"dYdX",    type:"Perps DEX",      risk:"MEDIUM",score:55,delta:"-3",exp:["US"]},
  {name:"Tornado", type:"Privacy Mixer",  risk:"HIGH",  score:12,delta:"0", exp:["US","EU","UK","SG","UAE"]}
];
const FALLBACK = [
  {id:1,j:"EU",urgency:"HIGH",time:"2h ago",unread:true,tag:"STABLECOINS",
   title:"MiCA Art. 45 — €200M/day Stablecoin Cap Binding from Q3 2026",
   summary:"ESMA published binding technical standards under MiCA Article 45 setting a €200M/day retail transaction cap on all e-money tokens. Non-compliance triggers automatic suspension. Directly applicable — no national transposition required.",
   affects:["MakerDAO","Lido"],action:"Review stablecoin issuance volumes immediately. Legal counsel engagement required before May 1.",deadline:"May 1, 2026",source:"ESMA Official Journal · Reg (EU) 2023/1114 Art. 45"},
  {id:2,j:"US",urgency:"HIGH",time:"4h ago",unread:true,tag:"MARKET STRUCTURE",
   title:"CLARITY Act Senate Markup Stalled — ABA Rejects Compromise (Mar 5)",
   summary:"The ABA formally rejected the White House-brokered CLARITY Act compromise on March 5, 2026. SEC/CFTC jurisdiction over digital assets remains legally unresolved, creating acute uncertainty for custody architecture decisions.",
   affects:["Uniswap","dYdX"],action:"Freeze custody structure commitments. Do not adopt SEC-only or CFTC-only compliance posture until jurisdiction is resolved.",deadline:"Late March 2026",source:"Senate Banking Committee · Baker McKenzie"},
  {id:3,j:"US",urgency:"MEDIUM",time:"6h ago",unread:false,tag:"ENFORCEMENT",
   title:"SEC Staff Bulletin 2026-04 — AMMs at Risk of Broker-Dealer Classification",
   summary:"SEC guidance clarifies that AMMs with governance tokens enabling fee extraction may qualify as broker-dealers. 60-day comment period open.",
   affects:["Uniswap","dYdX"],action:"Prepare legal analysis of governance token exposure. Monitor for enforcement signals.",deadline:"60-day comment period",source:"SEC.gov Staff Bulletin 2026-04"},
  {id:4,j:"SG",urgency:"LOW",time:"1d ago",unread:false,tag:"LICENSING",
   title:"MAS PSN02 — On-Chain Analytics Mandatory for DPT Licensees Q4 2026",
   summary:"MAS revised DPT licensing criteria to mandate approved on-chain analytics tools for AML compliance by Q4 2026.",
   affects:[],action:"Verify analytics tooling against MAS approved vendor list.",deadline:"Q4 2026",source:"MAS Notice PSN02"},
  {id:5,j:"UAE",urgency:"LOW",time:"2d ago",unread:false,tag:"CUSTODY",
   title:"VARA Rulebook V2 — Real-Time Proof-of-Reserves Required Jan 2027",
   summary:"VARA's updated custody rulebook requires full asset segregation and real-time proof-of-reserves. Effective January 2027.",
   affects:["Aave"],action:"No immediate action. Add to 2027 compliance roadmap.",deadline:"January 2027",source:"VARA Rulebook V2.0"},
  {id:6,j:"UK",urgency:"MEDIUM",time:"3d ago",unread:false,tag:"AML/CFT",
   title:"FCA PS26/1 — Travel Rule Threshold Lowered to £0 from June 2026",
   summary:"FCA lowered the travel rule threshold to £0, requiring full originator/beneficiary data on every crypto transfer regardless of size.",
   affects:[],action:"Update transaction monitoring infrastructure before June 1, 2026.",deadline:"June 1, 2026",source:"FCA PS26/1 · MLR 2017"}
];

let FEED=[...FALLBACK],selId=FEED[0].id,filter="ALL",view="feed",msgs=[],loading=false;

const SYS=`You are the Argus Intelligence analyst desk — a senior crypto regulatory intelligence analyst serving institutional clients.
ACTIVE ALERTS: MiCA Art.45 €200M/day cap Q3 2026 (affects MakerDAO/Lido). CLARITY Act STALLED Mar 5 2026. SEC Bulletin 2026-04 AMM broker-dealer risk. MAS PSN02 analytics Q4 2026. VARA V2 Jan 2027. FCA PS26/1 £0 travel rule Jun 2026.
PROTOCOL SCORES: Aave 82 LOW · Uniswap 79 LOW · Lido 61 MEDIUM · MakerDAO 58 MEDIUM · dYdX 55 MEDIUM · Tornado 12 HIGH.
STYLE: Direct, institutional, senior analyst voice. Structure: situation → timeline → implication → action. No disclaimers.`;

const SUGGS=["Should we custody assets with Lido given EU exposure?","What does the CLARITY Act stall mean for our US trading desk?","Compare Aave vs MakerDAO for institutional custody risk","What are our key deadlines this quarter?"];

const HDR={feed:{t:"Intelligence Feed",s:"Real-time monitoring · 5 jurisdictions · Updated continuously"},desk:{t:"Analyst Desk",s:"Live Claude intelligence · Full regulatory context loaded"},risk:{t:"Counterparty Risk",s:"Protocol safety scores · Updated on regulatory event · 6 protocols"}};

function ha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function jc(c){return (J.find(x=>x.code===c)||{color:"#888"}).color;}
function pill(l,c,dim){return `<span class="pill" style="color:${c};background:${dim?ha(c,.07):'transparent'};border-color:${ha(c,dim?.16:.25)}">${l}</span>`;}
function upill(lv){return pill({HIGH:"● HIGH",MEDIUM:"● MED",LOW:"● LOW"}[lv],RC[lv],true);}
function jpill(c){return pill(c,jc(c),true);}
function ring(score,risk,sz){sz=sz||76;const r=(sz-12)/2,ci=2*Math.PI*r,f=(score/100)*ci,cx=sz/2,col=RC[risk];
  return `<div style="position:relative;width:${sz}px;height:${sz}px;flex-shrink:0"><svg width="${sz}" height="${sz}" style="transform:rotate(-90deg);display:block"><circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="#1A2438" stroke-width="5"/><circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${col}" stroke-width="5" stroke-dasharray="${f} ${ci-f}" stroke-linecap="round" style="filter:drop-shadow(0 0 5px ${col}80)"/></svg><div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><span style="font-size:18px;font-weight:700;color:${col};font-family:'IBM Plex Mono',monospace;line-height:1">${score}</span><span style="font-size:8px;color:var(--muted);font-family:'IBM Plex Mono',monospace">/100</span></div></div>`;}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.addEventListener('DOMContentLoaded',()=>{
  buildSidebar();buildStats();renderFeed();renderDesk();renderRisk();startClock();
  fetch('feed.json?t='+Date.now()).then(r=>r.json()).then(d=>{
    if(Array.isArray(d)&&d.length>0){FEED=d;selId=FEED[0].id;renderFeed();buildStats();updateBadges();
      document.getElementById('hdr-sub').textContent='Real-time monitoring · 5 jurisdictions · Updated '+new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
  }).catch(()=>{});
});

function startClock(){
  const t=()=>{const d=new Date(),e=document.getElementById('utc');if(e)e.textContent=[d.getUTCHours(),d.getUTCMinutes(),d.getUTCSeconds()].map(n=>String(n).padStart(2,'0')).join(':');};
  t();setInterval(t,1000);
}
function updateBadges(){
  const u=FEED.filter(f=>f.unread).length,h=PROTOCOLS.filter(p=>p.risk==='HIGH').length;
  const bf=document.getElementById('badge-feed'),br=document.getElementById('badge-risk');
  if(bf){bf.textContent=u;bf.style.display=u>0?'':'none';}
  if(br){br.textContent=h;br.style.display=h>0?'':'none';}
}
function switchView(v){
  view=v;
  ['feed','desk','risk'].forEach(id=>{
    document.getElementById('view-'+id).style.display=id===v?'':'none';
    document.querySelector(`.nbtn[data-view="${id}"]`).classList.toggle('active',id===v);
  });
  document.getElementById('hdr-title').textContent=HDR[v].t;
  document.getElementById('hdr-sub').textContent=HDR[v].s;
}
function buildSidebar(){
  document.getElementById('feed-rows').innerHTML=J.map(j=>`<div class="frow"><div class="frow-l"><span class="dot-wrap"><span class="dot-ping" style="background:${j.color}"></span><span class="dot-core" style="background:${j.color};box-shadow:0 0 7px ${j.color}"></span></span><span class="fcode">${j.code}</span></div><span class="flive">LIVE</span></div>`).join('');
  updateBadges();
}
function buildStats(){
  document.getElementById('hdr-stats').innerHTML=[[FEED.filter(f=>f.urgency==='HIGH').length,'HIGH ALERTS','#FF3355'],[FEED.filter(f=>f.unread).length,'UNREAD','#FFAA00'],[PROTOCOLS.length,'PROTOCOLS','#00DEB0'],[J.length,'FEEDS','#3DA5FF']].map(([n,l,c])=>`<div><div class="stat-n" style="color:${c};text-shadow:0 0 24px ${ha(c,.25)}">${n}</div><div class="stat-l">${l}</div></div>`).join('');
}

function renderFeed(){
  document.getElementById('view-feed').innerHTML=`<div class="feed-wrap"><div class="feed-list"><div class="feed-filters" id="ffilters"></div><div class="feed-items" id="fitems"></div></div><div class="feed-detail" id="fdetail"></div></div>`;
  buildFilters();buildItems();buildDetail();
}
function buildFilters(){
  const el=document.getElementById('ffilters');if(!el)return;
  el.innerHTML=['ALL',...J.map(j=>j.code)].map(f=>{const c=f==='ALL'?'#B8FF00':jc(f),on=filter===f;return `<button class="fbtn" onclick="setFilter('${f}')" style="${on?`border-color:${c};background:${ha(c,.09)};color:${c}`:''}">${f}</button>`;}).join('');
}
function setFilter(f){filter=f;buildFilters();buildItems();}
function buildItems(){
  const el=document.getElementById('fitems');if(!el)return;
  const list=filter==='ALL'?FEED:FEED.filter(i=>i.j===filter);
  el.innerHTML=list.map((item,idx)=>{const rc=RC[item.urgency],on=item.id===selId;
    return `<div class="fitem${on?' active':''}" style="animation-delay:${idx*.05}s;border-left-color:${on?rc:'transparent'};background:${on?ha(rc,.03):''}" onclick="selectItem(${item.id})">
      <div class="fibadges">${jpill(item.j)}${upill(item.urgency)}${pill(item.tag,'#3E4D6A',false)}${item.unread?'<span class="udot"></span>':''}<span class="fitime">${item.time}</span></div>
      <div class="fititle">${item.title}</div>
      ${item.affects&&item.affects.length?`<div style="display:flex;gap:4px;flex-wrap:wrap">${item.affects.map(p=>`<span class="achip">⚡ ${p}</span>`).join('')}</div>`:''}
    </div>`;}).join('');
}
function selectItem(id){selId=id;buildItems();buildDetail();}
function buildDetail(){
  const el=document.getElementById('fdetail');if(!el)return;
  const item=FEED.find(f=>f.id===selId);
  if(!item){el.innerHTML=`<div class="dempty"><span style="font-size:60px;opacity:.05;color:var(--text)">◈</span><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)">Select an alert to view intelligence</span></div>`;return;}
  const r2=11,ci2=2*Math.PI*r2;
  el.innerHTML=`<div style="animation:fadeIn .2s ease">
    <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">${jpill(item.j)}${upill(item.urgency)}${pill(item.tag,'#3E4D6A',false)}</div>
    <div style="font-size:22px;font-weight:800;color:var(--text);font-family:'Manrope',sans-serif;line-height:1.3;margin-bottom:10px;letter-spacing:-.015em">${item.title}</div>
    <div style="font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-bottom:30px;display:flex;gap:12px"><span>${item.time}</span><span style="color:var(--border)">·</span><span>SOURCE: ${item.source}</span></div>
    <div class="sblock"><div class="slbl">INTELLIGENCE SUMMARY</div><p class="stext">${item.summary}</p></div>
    <div class="sblock"><div class="slbl">RECOMMENDED ACTION</div><div class="abox"><span style="color:var(--accent);font-size:17px;flex-shrink:0;margin-top:1px">→</span><p style="font-size:13.5px;color:var(--text);line-height:1.75;font-family:'Manrope',sans-serif">${item.action}</p></div></div>
    ${item.deadline?`<div class="sblock"><div class="slbl">KEY DEADLINE</div><div class="dbox"><span style="color:var(--red)">⏱</span><span style="font-size:12px;color:var(--red);font-family:'IBM Plex Mono',monospace;font-weight:700">${item.deadline}</span></div></div>`:''}
    ${item.affects&&item.affects.length?`<div class="sblock"><div class="slbl">PROTOCOL EXPOSURE</div>${item.affects.map(name=>{const p=PROTOCOLS.find(x=>x.name===name);if(!p)return '';const col=RC[p.risk],f2=(p.score/100)*ci2;return `<div class="pcard" onmouseenter="this.style.borderColor='${ha(col,.25)}'" onmouseleave="this.style.borderColor='var(--border)'"><div><div style="font-size:14px;font-weight:800;color:var(--text);font-family:'Manrope',sans-serif;margin-bottom:3px">${p.name}</div><div style="font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace">${p.type}</div></div><div style="display:flex;align-items:center;gap:14px"><div style="text-align:right"><div style="font-size:10px;color:${col};font-family:'IBM Plex Mono',monospace;font-weight:700">${p.risk} RISK</div><div style="font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace">Score ${p.score}/100</div></div><div style="position:relative;width:32px;height:32px"><svg width="32" height="32" style="transform:rotate(-90deg);display:block"><circle cx="16" cy="16" r="${r2}" fill="none" stroke="#1A2438" stroke-width="4"/><circle cx="16" cy="16" r="${r2}" fill="none" stroke="${col}" stroke-width="4" stroke-dasharray="${f2} ${ci2-f2}" stroke-linecap="round" style="filter:drop-shadow(0 0 3px ${col}88)"/></svg></div></div></div>`;}).join('')}</div>`:''}
  </div>`;
}

function renderDesk(){
  msgs=[{role:'assistant',content:'Argus Intelligence Desk — online.\n\nContext loaded: 6 active regulatory alerts · 6 protocol risk profiles · 5 jurisdiction feeds.\n\nWhat do you need?'}];
  document.getElementById('view-desk').innerHTML=`<div class="desk-wrap">
    <div class="ctx-strip"><span style="font-size:8px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.18em">CONTEXT:</span>${[['6 ALERTS','#FF3355'],['6 PROTOCOLS','#FFAA00'],['5 JURISDICTIONS','#00DEB0'],['CLARITY ACT','#B8FF00'],['MICA Q3 2026','#3DA5FF']].map(([v,c])=>`<span style="font-size:8px;color:${c};font-family:'IBM Plex Mono',monospace;font-weight:700;letter-spacing:.1em">● ${v}</span>`).join('')}</div>
    <div class="msgs" id="msgs"></div>
    <div class="suggs" id="suggs"><div style="font-size:8px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.16em;margin-bottom:8px">SUGGESTED QUERIES</div><div>${SUGGS.map(s=>`<button class="sugg-btn" onclick="fillQ(this)">${s}</button>`).join('')}</div></div>
    <div class="inp-row"><input class="cinput" id="cinput" placeholder="Ask about any regulation, protocol, or jurisdiction…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"/><button class="sbtn off" id="sbtn" onclick="sendMsg()">→</button></div>
  </div>`;
  renderMsgs();
  const inp=document.getElementById('cinput');
  inp.addEventListener('input',()=>{const b=document.getElementById('sbtn');if(b)b.className='sbtn '+(inp.value.trim()?'on':'off');});
}
function fillQ(btn){const i=document.getElementById('cinput');if(i){i.value=btn.textContent;i.dispatchEvent(new Event('input'));i.focus();}}
function renderMsgs(){
  const el=document.getElementById('msgs');if(!el)return;
  el.innerHTML=msgs.map(m=>`<div class="msg-w ${m.role}"><div class="mfrom">${m.role==='user'?'YOU':'◈ ARGUS INTELLIGENCE'}</div><div class="mbub ${m.role}">${esc(m.content)}</div></div>`).join('');
  if(loading)el.innerHTML+=`<div class="msg-w assistant"><div class="mfrom">◈ ARGUS INTELLIGENCE</div><div class="typing-bub">${[0,1,2].map(i=>`<span class="tdot" style="animation:blink 1.2s ease ${i*.22}s infinite"></span>`).join('')}</div></div>`;
  el.scrollTop=el.scrollHeight;
  const s=document.getElementById('suggs');if(s)s.style.display=msgs.some(m=>m.role==='user')?'none':'';
}
async function sendMsg(){
  const inp=document.getElementById('cinput');if(!inp||!inp.value.trim()||loading)return;
  const txt=inp.value.trim();inp.value='';
  const b=document.getElementById('sbtn');if(b)b.className='sbtn off';
  msgs.push({role:'user',content:txt});loading=true;renderMsgs();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-allow-browser':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,messages:msgs.map(m=>({role:m.role,content:m.content}))})});
    const data=await res.json();
    msgs.push({role:'assistant',content:data.content?.[0]?.text||'No response.'});
  }catch(e){msgs.push({role:'assistant',content:'Connection error — check your API key and retry.'});}
  loading=false;renderMsgs();
}

function renderRisk(){
  document.getElementById('view-risk').innerHTML=`<div class="risk-wrap">
    <div style="margin-bottom:24px"><div style="font-size:17px;font-weight:800;color:var(--text);font-family:'Manrope',sans-serif;margin-bottom:4px">Counterparty Risk Monitor</div><div style="font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace">Scores reflect current regulatory exposure · Higher = safer for institutional custody</div></div>
    <div class="risk-grid">${PROTOCOLS.map((p,i)=>{const col=RC[p.risk],d=parseFloat(p.delta);return `<div class="rcard" style="animation-delay:${i*.07}s" onmouseenter="this.style.borderColor='${ha(col,.31)}';this.style.boxShadow='0 14px 44px ${ha(col,.07)}'" onmouseleave="this.style.borderColor='var(--border)';this.style.boxShadow='none'">
      <div style="position:absolute;top:-25px;right:-25px;width:90px;height:90px;border-radius:50%;background:${col};opacity:.05;pointer-events:none"></div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px"><div><div style="font-size:16px;font-weight:800;color:var(--text);font-family:'Manrope',sans-serif;margin-bottom:3px">${p.name}</div><div style="font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace">${p.type}</div></div>${upill(p.risk)}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">${ring(p.score,p.risk,76)}<div style="text-align:right"><div style="font-size:16px;font-weight:800;font-family:'IBM Plex Mono',monospace;color:${d>=0?'#00DEB0':'#FF3355'};margin-bottom:3px">${d>=0?'▲':'▼'} ${Math.abs(d)}</div><div style="font-size:8px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.1em">WK CHANGE</div></div></div>
      <div><div style="font-size:8px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.14em;margin-bottom:7px">REGULATORY EXPOSURE</div><div style="display:flex;gap:4px;flex-wrap:wrap">${p.exp.map(c=>jpill(c)).join('')}</div></div>
    </div>`;}).join('')}</div>
    <div class="rleg"><span style="font-size:8px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:.14em">SCORE LEGEND:</span>${[['75–100','#00DEB0','Suitable for institutional custody'],['50–74','#FFAA00','Monitor actively, legal review advised'],['0–49','#FF3355','Avoid for institutional use']].map(([r,c,d])=>`<div style="display:flex;align-items:center;gap:8px"><span style="width:7px;height:7px;border-radius:50%;background:${c};display:block;box-shadow:0 0 6px ${c}"></span><span style="font-size:10px;color:${c};font-family:'IBM Plex Mono',monospace;font-weight:700">${r}</span><span style="font-size:10px;color:var(--muted);font-family:'Manrope',sans-serif">${d}</span></div>`).join('')}</div>
  </div>`;
}
</script>
</body>
</html>
